<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown to Our Special Moments</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080810">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;700&family=Noto+Sans+Hebrew:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --font-hebrew: 'Noto Sans Hebrew', sans-serif;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: var(--font-body);
    background: #080810;
    color: #e0d8cc;
  }

  /* ═══════════════════════════════════════ */
  /* LAYOUT — split screen                  */
  /* ═══════════════════════════════════════ */
  .app {
    display: flex;
    height: 100vh;
    height: 100dvh;
  }

  .panel {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
    position: relative;
  }

  /* Thin divider between panels */
  .panel-divider {
    width: 1px;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(255,255,255,0.06) 20%,
      rgba(255,255,255,0.1) 50%,
      rgba(255,255,255,0.06) 80%,
      transparent 100%
    );
    flex-shrink: 0;
    z-index: 10;
  }

  /* Panel headers — sticky category label */
  .panel-header {
    position: sticky;
    top: 0;
    z-index: 50;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: linear-gradient(180deg, rgba(8,8,16,0.95) 0%, rgba(8,8,16,0.7) 70%, transparent 100%);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .panel-header-icon {
    font-size: 0.75rem;
    opacity: 0.4;
  }

  .panel-header-label {
    font-family: var(--font-body);
    font-weight: 300;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.4;
  }

  /* ─── Section base ─── */
  .event-section {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    scroll-snap-align: start;
    padding: 2rem 1.5rem;
  }

  /* ═══════════════════════════════════════ */
  /* USA FAMILY TRIP — navy / amber         */
  /* ═══════════════════════════════════════ */
  .trip-section {
    background:
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(244, 168, 60, 0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
      linear-gradient(175deg, #0b1d3a 0%, #0f2847 40%, #132e52 100%);
    color: #e8dcc8;
  }

  .trip-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 15% 85%, rgba(255,255,255,0.45) 0%, transparent 100%);
    opacity: 0.6;
    animation: twinkle 6s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes twinkle {
    0% { opacity: 0.4; }
    100% { opacity: 0.8; }
  }

  .trip-section .event-title {
    background: linear-gradient(135deg, #f4a83c 0%, #ff6b35 50%, #f4a83c 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s ease-in-out infinite;
  }

  .trip-section .countdown-number {
    color: #f4a83c;
    text-shadow: 0 0 30px rgba(244, 168, 60, 0.3), 0 0 60px rgba(255, 107, 53, 0.1);
  }

  /* Airplane decoration */
  .airplane-path {
    position: absolute;
    top: 12%;
    left: -5%;
    width: 110%;
    height: 30%;
    pointer-events: none;
    overflow: visible;
  }

  .airplane-icon {
    font-size: 1.5rem;
    filter: drop-shadow(0 0 8px rgba(244, 168, 60, 0.4));
    offset-path: path('M0,80 C200,20 400,120 600,40 C800,-30 1000,90 1200,50');
    animation: fly 20s linear infinite;
    position: absolute;
  }

  @keyframes fly {
    0% { offset-distance: 0%; opacity: 0; }
    5% { opacity: 1; }
    90% { opacity: 1; }
    100% { offset-distance: 100%; opacity: 0; }
  }

  .dashed-trail {
    fill: none;
    stroke: rgba(244, 168, 60, 0.15);
    stroke-width: 1.5;
    stroke-dasharray: 8 6;
    animation: dash 30s linear infinite;
  }

  @keyframes dash {
    to { stroke-dashoffset: -300; }
  }

  /* ═══════════════════════════════════════ */
  /* BAR MITZVAH — purple / gold            */
  /* ═══════════════════════════════════════ */
  .bar-section {
    background:
      radial-gradient(ellipse 70% 50% at 75% 75%, rgba(201, 168, 76, 0.1) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 20% 30%, rgba(123, 94, 167, 0.12) 0%, transparent 50%),
      linear-gradient(175deg, #1a0a2e 0%, #1e1040 40%, #251555 100%);
    color: #f0e6d3;
  }

  .bar-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-conic-gradient(
        from 0deg at 50% 50%,
        transparent 0deg 30deg,
        rgba(201, 168, 76, 0.015) 30deg 60deg
      );
    pointer-events: none;
  }

  .bar-section .event-title {
    background: linear-gradient(135deg, #c9a84c 0%, #e8d48b 40%, #c9a84c 80%, #a07830 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 5s ease-in-out infinite;
  }

  .bar-section .countdown-number {
    color: #c9a84c;
    text-shadow: 0 0 30px rgba(201, 168, 76, 0.25), 0 0 60px rgba(123, 94, 167, 0.1);
  }

  .star-decoration {
    position: absolute;
    width: 250px;
    height: 250px;
    opacity: 0.04;
    pointer-events: none;
  }

  .star-decoration.top-right {
    top: 5%;
    right: 5%;
    animation: float-slow 12s ease-in-out infinite;
  }

  .star-decoration.bottom-left {
    bottom: 8%;
    left: 3%;
    width: 180px;
    height: 180px;
    animation: float-slow 15s ease-in-out infinite reverse;
  }

  @keyframes float-slow {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(8deg); }
  }

  .star-decoration svg {
    width: 100%;
    height: 100%;
    fill: #c9a84c;
  }

  /* ═══════════════════════════════════════ */
  /* RETIREMENT — warm sunset / golden hour */
  /* ═══════════════════════════════════════ */
  .retirement-section {
    background:
      radial-gradient(ellipse 80% 50% at 50% 80%, rgba(255, 140, 50, 0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 30% 20%, rgba(255, 90, 50, 0.08) 0%, transparent 50%),
      linear-gradient(175deg, #1a1005 0%, #2a1a08 30%, #3d2510 60%, #1a1005 100%);
    color: #f0e0c8;
  }

  .retirement-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 100% 40% at 50% 100%, rgba(255, 160, 60, 0.08) 0%, transparent 70%),
      radial-gradient(circle 200px at 80% 30%, rgba(255, 100, 50, 0.04) 0%, transparent 100%);
    pointer-events: none;
  }

  .retirement-section .event-title {
    background: linear-gradient(135deg, #e8a040 0%, #ffcc70 30%, #ff8c40 60%, #e8a040 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 5s ease-in-out infinite;
  }

  .retirement-section .countdown-number {
    color: #e8a040;
    text-shadow: 0 0 30px rgba(232, 160, 64, 0.3), 0 0 60px rgba(255, 140, 50, 0.1);
  }

  .sun-glow {
    position: absolute;
    bottom: 15%;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 150px;
    background: radial-gradient(ellipse at 50% 100%, rgba(255, 160, 60, 0.08) 0%, transparent 70%);
    pointer-events: none;
    animation: sun-pulse 6s ease-in-out infinite alternate;
  }

  @keyframes sun-pulse {
    0% { opacity: 0.6; transform: translateX(-50%) scale(1); }
    100% { opacity: 1; transform: translateX(-50%) scale(1.1); }
  }

  /* ═══════════════════════════════════════ */
  /* ANNIVERSARY — deep rose / crimson      */
  /* ═══════════════════════════════════════ */
  .anniversary-section {
    background:
      radial-gradient(ellipse 70% 50% at 30% 70%, rgba(190, 50, 70, 0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 25%, rgba(220, 80, 100, 0.08) 0%, transparent 50%),
      linear-gradient(175deg, #2a0a14 0%, #3d1020 40%, #4a1428 100%);
    color: #f0dde0;
  }

  .anniversary-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle 200px at 20% 30%, rgba(220, 80, 100, 0.06) 0%, transparent 100%),
      radial-gradient(circle 300px at 75% 70%, rgba(190, 50, 70, 0.05) 0%, transparent 100%);
    pointer-events: none;
  }

  .anniversary-section .event-title {
    background: linear-gradient(135deg, #e85d75 0%, #f4a0b0 40%, #e85d75 80%, #c43a52 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4.5s ease-in-out infinite;
  }

  .anniversary-section .countdown-number {
    color: #e85d75;
    text-shadow: 0 0 30px rgba(232, 93, 117, 0.3), 0 0 60px rgba(190, 50, 70, 0.1);
  }

  .heart-float {
    position: absolute;
    font-size: 1.5rem;
    opacity: 0;
    pointer-events: none;
    animation: heart-rise 8s ease-in infinite;
  }

  .heart-float:nth-child(3) { left: 15%; animation-delay: 1.5s; font-size: 1.2rem; }
  .heart-float:nth-child(4) { left: 80%; animation-delay: 3s; font-size: 1rem; }
  .heart-float:nth-child(5) { left: 50%; animation-delay: 5s; font-size: 1.8rem; }
  .heart-float:nth-child(6) { left: 35%; animation-delay: 6.5s; font-size: 1.1rem; }

  @keyframes heart-rise {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.15; }
    80% { opacity: 0.1; }
    100% { transform: translateY(-10vh) rotate(25deg); opacity: 0; }
  }

  /* ═══════════════════════════════════════ */
  /* MY BIRTHDAY — teal / emerald           */
  /* ═══════════════════════════════════════ */
  .birthday-section {
    background:
      radial-gradient(ellipse 70% 50% at 25% 75%, rgba(34, 180, 160, 0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 20%, rgba(0, 210, 180, 0.07) 0%, transparent 50%),
      linear-gradient(175deg, #061a1a 0%, #0a2928 40%, #0d3533 100%);
    color: #d0ece8;
  }

  .birthday-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle 250px at 70% 60%, rgba(34, 180, 160, 0.05) 0%, transparent 100%),
      radial-gradient(circle 180px at 20% 40%, rgba(0, 210, 180, 0.04) 0%, transparent 100%);
    pointer-events: none;
  }

  .birthday-section .event-title {
    background: linear-gradient(135deg, #22b4a0 0%, #5eecd5 40%, #22b4a0 80%, #18887a 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s ease-in-out infinite;
  }

  .birthday-section .countdown-number {
    color: #22b4a0;
    text-shadow: 0 0 30px rgba(34, 180, 160, 0.3), 0 0 60px rgba(0, 210, 180, 0.1);
  }

  /* ═══════════════════════════════════════ */
  /* JONATHAN'S BIRTHDAY — electric blue    */
  /* ═══════════════════════════════════════ */
  .jonathan-section {
    background:
      radial-gradient(ellipse 70% 50% at 75% 70%, rgba(60, 130, 246, 0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 20% 30%, rgba(100, 180, 255, 0.08) 0%, transparent 50%),
      linear-gradient(175deg, #080e24 0%, #0c1638 40%, #101e4a 100%);
    color: #d0ddf0;
  }

  .jonathan-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle 200px at 60% 30%, rgba(60, 130, 246, 0.06) 0%, transparent 100%),
      radial-gradient(circle 250px at 30% 70%, rgba(100, 180, 255, 0.04) 0%, transparent 100%);
    pointer-events: none;
  }

  .jonathan-section .event-title {
    background: linear-gradient(135deg, #3c82f6 0%, #7cb8ff 40%, #3c82f6 80%, #2560c4 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s ease-in-out infinite;
  }

  .jonathan-section .countdown-number {
    color: #3c82f6;
    text-shadow: 0 0 30px rgba(60, 130, 246, 0.3), 0 0 60px rgba(100, 180, 255, 0.1);
  }

  .balloon-float {
    position: absolute;
    font-size: 2rem;
    opacity: 0;
    pointer-events: none;
    animation: balloon-rise 10s ease-in infinite;
  }

  .balloon-float:nth-child(3) { left: 10%; animation-delay: 2s; font-size: 1.6rem; }
  .balloon-float:nth-child(4) { left: 85%; animation-delay: 4s; font-size: 1.4rem; }
  .balloon-float:nth-child(5) { left: 55%; animation-delay: 6s; font-size: 2.2rem; }
  .balloon-float:nth-child(6) { left: 30%; animation-delay: 8s; font-size: 1.3rem; }

  @keyframes balloon-rise {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.2; }
    80% { opacity: 0.12; }
    100% { transform: translateY(-10vh) rotate(-15deg); opacity: 0; }
  }

  /* ═══════════════════════════════════════ */
  /* WIFE'S BIRTHDAY — blush pink / winter  */
  /* ═══════════════════════════════════════ */
  .wife-section {
    background:
      radial-gradient(ellipse 70% 50% at 70% 65%, rgba(200, 140, 170, 0.1) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 25% 30%, rgba(180, 160, 200, 0.08) 0%, transparent 50%),
      linear-gradient(175deg, #1c0e20 0%, #261430 40%, #2e183a 100%);
    color: #eedde6;
  }

  .wife-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle 200px at 80% 20%, rgba(200, 140, 170, 0.05) 0%, transparent 100%),
      radial-gradient(circle 300px at 20% 80%, rgba(180, 160, 200, 0.04) 0%, transparent 100%);
    pointer-events: none;
  }

  .wife-section .event-title {
    background: linear-gradient(135deg, #d4849e 0%, #f0b8cc 40%, #d4849e 80%, #b8607a 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4.5s ease-in-out infinite;
  }

  .wife-section .countdown-number {
    color: #d4849e;
    text-shadow: 0 0 30px rgba(212, 132, 158, 0.3), 0 0 60px rgba(180, 160, 200, 0.1);
  }

  .snowflake {
    position: absolute;
    color: rgba(255, 255, 255, 0.12);
    font-size: 1.2rem;
    pointer-events: none;
    animation: snow-fall 12s linear infinite;
  }

  .snowflake:nth-child(3) { left: 20%; animation-delay: 2s; font-size: 0.9rem; }
  .snowflake:nth-child(4) { left: 70%; animation-delay: 4s; font-size: 1.5rem; }
  .snowflake:nth-child(5) { left: 45%; animation-delay: 7s; font-size: 1rem; }
  .snowflake:nth-child(6) { left: 90%; animation-delay: 9s; font-size: 0.8rem; }

  @keyframes snow-fall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.12; }
    90% { opacity: 0.08; }
    100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
  }

  /* ═══════════════════════════════════════ */
  /* SHARED STYLES                          */
  /* ═══════════════════════════════════════ */
  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .event-label {
    font-family: var(--font-body);
    font-weight: 300;
    font-size: 0.75rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 0.75rem;
  }

  .event-title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(2rem, 5vw, 4rem);
    line-height: 1.05;
    margin-bottom: 0.25rem;
    position: relative;
    text-align: center;
  }

  .event-subtitle {
    font-family: var(--font-display);
    font-style: italic;
    font-size: clamp(0.9rem, 2vw, 1.3rem);
    opacity: 0.5;
    margin-bottom: 2rem;
    font-weight: 400;
    text-align: center;
  }

  .event-date {
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    opacity: 0.4;
    margin-bottom: 2.5rem;
  }

  .nudge-metric {
    font-family: var(--font-display);
    font-style: italic;
    font-size: clamp(0.95rem, 2.2vw, 1.2rem);
    opacity: 0.45;
    margin-top: 1.5rem;
    text-align: center;
    letter-spacing: 0.02em;
    transition: opacity 0.5s ease;
  }

  /* ─── Countdown grid ─── */
  .countdown {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(0.5rem, 1.5vw, 1.5rem);
    width: 100%;
    max-width: 550px;
  }

  .countdown-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
  }

  .countdown-number {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(2.2rem, 5.5vw, 4.5rem);
    line-height: 1;
    position: relative;
    font-variant-numeric: tabular-nums;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .countdown-number.flip {
    transform: scaleY(0.85);
  }

  .countdown-label {
    font-family: var(--font-body);
    font-weight: 300;
    font-size: clamp(0.55rem, 1.2vw, 0.75rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.4;
  }

  .countdown-unit:not(:last-child) {
    position: relative;
  }

  .countdown-unit:not(:last-child)::after {
    content: ':';
    position: absolute;
    right: calc(-0.25rem - 0.75vw);
    top: 0;
    font-family: var(--font-display);
    font-weight: 300;
    font-size: clamp(1.5rem, 3.5vw, 3rem);
    opacity: 0.15;
    line-height: 1;
  }

  /* ─── Scroll hint ─── */
  .scroll-hint {
    margin-top: 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    opacity: 0.25;
    animation: bob 2.5s ease-in-out infinite;
    cursor: pointer;
    background: none;
    border: none;
    color: inherit;
    font-family: var(--font-body);
  }

  .scroll-hint span {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  .scroll-hint svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(6px); }
  }

  /* ─── Particles canvas ─── */
  .particles-canvas {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* ─── Entrance animations ─── */
  .fade-up {
    opacity: 0;
    transform: translateY(25px);
    transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .fade-up.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .delay-1 { transition-delay: 0.1s; }
  .delay-2 { transition-delay: 0.25s; }
  .delay-3 { transition-delay: 0.4s; }
  .delay-4 { transition-delay: 0.6s; }

  /* ═══════════════════════════════════════ */
  /* MOBILE — tab switcher                  */
  /* ═══════════════════════════════════════ */
  .mobile-tabs {
    display: none;
  }

  @media (max-width: 768px) {
    .app {
      flex-direction: column;
    }

    .panel-divider {
      display: none;
    }

    .panel {
      display: none;
      flex: none;
      height: calc(100vh - 52px);
      height: calc(100dvh - 52px);
    }

    .panel.active-panel {
      display: block;
    }

    .mobile-tabs {
      display: flex;
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(8, 8, 16, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .mobile-tab {
      flex: 1;
      padding: 0.9rem 1rem;
      text-align: center;
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      background: none;
      border: none;
      cursor: pointer;
      position: relative;
      transition: color 0.3s;
    }

    .mobile-tab.active-tab {
      color: rgba(255,255,255,0.85);
    }

    .mobile-tab.active-tab::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20%;
      right: 20%;
      height: 2px;
      background: rgba(255,255,255,0.5);
      border-radius: 1px;
    }

    .panel-header {
      display: none;
    }

    .countdown-unit:not(:last-child)::after {
      display: none;
    }

    .airplane-path {
      display: none;
    }

    .event-section {
      min-height: calc(100dvh - 52px);
      padding-bottom: 3.5rem;
    }
  }
</style>
</head>
<body>

<!-- Mobile tab switcher -->
<div class="mobile-tabs">
  <button class="mobile-tab active-tab" data-panel="onetime-panel">Once in a Lifetime</button>
  <button class="mobile-tab" data-panel="recurring-panel">Every Year</button>
</div>

<div class="app">
  <div class="panel active-panel" id="onetime-panel">
    <div class="panel-header">
      <span class="panel-header-icon">&#9670;</span>
      <span class="panel-header-label">Once in a Lifetime</span>
    </div>
  </div>

  <div class="panel-divider"></div>

  <div class="panel" id="recurring-panel">
    <div class="panel-header">
      <span class="panel-header-icon">&#10227;</span>
      <span class="panel-header-label">Every Year</span>
    </div>
  </div>
</div>

<script src="events.js"></script>
<script>
  // ─── Decoration generators ───
  const decorations = {
    airplane: () => `
      <div class="airplane-path">
        <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
          <path class="dashed-trail" d="M0,80 C200,20 400,120 600,40 C800,-30 1000,90 1200,50"/>
        </svg>
        <div class="airplane-icon">&#9992;&#65039;</div>
      </div>`,
    stars: () => `
      <div class="star-decoration top-right">
        <svg viewBox="0 0 100 100"><polygon points="50,5 61,37 95,37 67,58 78,90 50,70 22,90 33,58 5,37 39,37"/></svg>
      </div>
      <div class="star-decoration bottom-left">
        <svg viewBox="0 0 100 100"><polygon points="50,5 61,37 95,37 67,58 78,90 50,70 22,90 33,58 5,37 39,37"/></svg>
      </div>`,
    sun: () => `<div class="sun-glow"></div>`,
    hearts: () => [65, 15, 80, 50, 35].map(l =>
      `<div class="heart-float" style="left:${l}%">&#10084;</div>`).join(''),
    balloons: () => [70, 10, 85, 55, 30].map((l, i) =>
      `<div class="balloon-float" style="left:${l}%">${i % 2 === 0 ? '&#127880;' : '&#127882;'}</div>`).join(''),
    snowflakes: () => [40, 20, 70, 45, 90].map(l =>
      `<div class="snowflake" style="left:${l}%">&#10052;</div>`).join(''),
  };

  function buildSection(ev, isLast) {
    const subtitleStyle = ev.subtitleStyle === 'hebrew'
      ? ' style="font-family: var(--font-hebrew); font-style: normal; font-size: clamp(1rem, 2vw, 1.3rem);"'
      : '';
    const deco = ev.decoration && decorations[ev.decoration] ? decorations[ev.decoration]() : '';
    const scrollBtn = isLast ? '' : `
      <button class="scroll-hint fade-up delay-4" onclick="this.closest('section').nextElementSibling.scrollIntoView({behavior:'smooth'})">
        <span>Scroll down</span>
        <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </button>`;

    return `
    <section class="event-section ${ev.theme}-section">
      <canvas class="particles-canvas" id="${ev.id}-particles"></canvas>
      ${deco}
      <p class="event-label fade-up">Counting down to</p>
      <h1 class="event-title fade-up delay-1">${ev.title}</h1>
      <p class="event-subtitle fade-up delay-2"${subtitleStyle}>${ev.subtitle}</p>
      <p class="event-date fade-up delay-2">${ev.dateDisplay}</p>
      <div class="countdown fade-up delay-3">
        <div class="countdown-unit">
          <span class="countdown-number" id="${ev.id}-days">--</span>
          <span class="countdown-label">Days</span>
        </div>
        <div class="countdown-unit">
          <span class="countdown-number" id="${ev.id}-hours">--</span>
          <span class="countdown-label">Hours</span>
        </div>
        <div class="countdown-unit">
          <span class="countdown-number" id="${ev.id}-mins">--</span>
          <span class="countdown-label">Minutes</span>
        </div>
        <div class="countdown-unit">
          <span class="countdown-number" id="${ev.id}-secs">--</span>
          <span class="countdown-label">Seconds</span>
        </div>
      </div>
      <p class="nudge-metric fade-up delay-4" id="${ev.id}-nudge"></p>
      ${scrollBtn}
    </section>`;
  }

  function getNextOccurrence(month, day) {
    const now = new Date();
    let target = new Date(now.getFullYear(), month - 1, day);
    if (target <= now) target = new Date(now.getFullYear() + 1, month - 1, day);
    return target;
  }

  // ─── Nudge metric — psychology-driven secondary unit ───
  function computeNudge(totalDays) {
    if (totalDays <= 0) return '';
    const workdays = totalDays - (Math.floor(totalDays / 7) * 2);
    const weeks = Math.floor(totalDays / 7);
    const months = Math.round(totalDays / 30.44);
    const years = (totalDays / 365.25).toFixed(1);
    const weekends = weeks;

    if (totalDays > 5 * 365) {
      return `That\u2019s ${years} years \u00b7 ${workdays.toLocaleString()} workdays`;
    } else if (totalDays > 365) {
      return `${months} months \u00b7 ${workdays.toLocaleString()} workdays`;
    } else if (totalDays > 84) {
      return `${weeks} weeks \u00b7 ${weekends} weekends to prepare`;
    } else if (totalDays > 7) {
      return `Only ${workdays} workdays \u00b7 ${weekends} weekends left`;
    } else {
      return `Only ${totalDays} sleep${totalDays !== 1 ? 's' : ''} away`;
    }
  }

  // ─── Render events from EVENTS global ───
  (function() {
    const onetimePanel = document.getElementById('onetime-panel');
    const recurringPanel = document.getElementById('recurring-panel');
    const countdownTargets = [];

    // One-time events
    EVENTS.onetime.forEach((ev, i) => {
      onetimePanel.insertAdjacentHTML('beforeend', buildSection(ev, i === EVENTS.onetime.length - 1));
      countdownTargets.push({ target: new Date(ev.date), prefix: ev.id, particleColor: ev.particleColor });
    });

    // Recurring events
    EVENTS.recurring.forEach((ev, i) => {
      recurringPanel.insertAdjacentHTML('beforeend', buildSection(ev, i === EVENTS.recurring.length - 1));
      const target = getNextOccurrence(ev.month, ev.day);
      countdownTargets.push({ target, prefix: ev.id, particleColor: ev.particleColor });
    });

    // ─── Initialize countdowns ───
    const events = countdownTargets.map(ev => ({
      target: ev.target,
      els: {
        days: document.getElementById(ev.prefix + '-days'),
        hours: document.getElementById(ev.prefix + '-hours'),
        mins: document.getElementById(ev.prefix + '-mins'),
        secs: document.getElementById(ev.prefix + '-secs'),
        nudge: document.getElementById(ev.prefix + '-nudge'),
      }
    }));

    function pad(n) { return String(n).padStart(2, '0'); }

    function updateCountdowns() {
      const now = new Date();
      events.forEach(ev => {
        const diff = ev.target - now;
        if (diff <= 0) {
          ev.els.days.textContent = '00';
          ev.els.hours.textContent = '00';
          ev.els.mins.textContent = '00';
          ev.els.secs.textContent = '00';
          return;
        }
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const mins = Math.floor((diff / (1000 * 60)) % 60);
        const secs = Math.floor((diff / 1000) % 60);
        const values = { days, hours: pad(hours), mins: pad(mins), secs: pad(secs) };

        // Update nudge metric
        const nudgeText = computeNudge(days);
        if (ev.els.nudge && ev.els.nudge.textContent !== nudgeText) {
          ev.els.nudge.textContent = nudgeText;
        }

        Object.keys(values).forEach(key => {
          const el = ev.els[key];
          const newVal = String(values[key]);
          if (el.textContent !== newVal) {
            el.classList.add('flip');
            setTimeout(() => { el.textContent = newVal; el.classList.remove('flip'); }, 150);
          }
        });
      });
    }

    updateCountdowns();
    setInterval(updateCountdowns, 1000);

    // ─── Fade-in observer ───
    const fadeObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-up').forEach(el => fadeObserver.observe(el));

    // ─── Particles ───
    countdownTargets.forEach(ev => initParticles(ev.prefix + '-particles', ev.particleColor, 30));
  })();

  // ─── Mobile tab switching ───
  document.querySelectorAll('.mobile-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active-tab'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
      tab.classList.add('active-tab');
      document.getElementById(tab.dataset.panel).classList.add('active-panel');
    });
  });

  // ─── Floating particles ───
  function initParticles(canvasId, color, count) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }

    function createParticle() {
      return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 0.5,
        dx: (Math.random() - 0.5) * 0.3,
        dy: (Math.random() - 0.5) * 0.3,
        alpha: Math.random() * 0.3 + 0.05,
        alphaDir: Math.random() > 0.5 ? 0.002 : -0.002,
      };
    }

    function init() {
      resize();
      particles = Array.from({ length: count }, createParticle);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        p.alpha += p.alphaDir;
        if (p.alpha <= 0.03 || p.alpha >= 0.35) p.alphaDir *= -1;
        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = color.replace('ALPHA', p.alpha);
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    init();
    draw();
  }
</script>

</body>
</html>
