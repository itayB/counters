name: Remove Event

on:
  workflow_dispatch:
    inputs:
      event_id:
        description: 'Event ID to remove (as shown in events.js)'
        required: true
        type: string

jobs:
  remove-event:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Remove event from events.js
        env:
          EVENT_ID: ${{ inputs.event_id }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('events.js', 'utf8');

            const eventsMatch = content.match(/const EVENTS = (\{[\s\S]*\});/);
            if (!eventsMatch) throw new Error('Could not parse events.js');
            const events = eval('(' + eventsMatch[1] + ')');

            const id = process.env.EVENT_ID;
            const beforeOnetime = events.onetime.length;
            const beforeRecurring = events.recurring.length;

            events.onetime = events.onetime.filter(e => e.id !== id);
            events.recurring = events.recurring.filter(e => e.id !== id);

            if (events.onetime.length === beforeOnetime && events.recurring.length === beforeRecurring) {
              throw new Error(`Event with id "${id}" not found`);
            }

            const output = 'const EVENTS = ' + JSON.stringify(events, null, 2) + ';\n';
            fs.writeFileSync('events.js', output);

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Remove event: ${{ inputs.event_id }}"
          branch: remove-event/${{ inputs.event_id }}
          title: "Remove event: ${{ inputs.event_id }}"
          body: |
            ## Remove Event
            - **Event ID:** ${{ inputs.event_id }}

            Auto-generated by the Remove Event workflow.
